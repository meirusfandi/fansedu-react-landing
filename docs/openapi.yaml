openapi: 3.0.3
info:
  title: Fansedu LMS & Landing API
  description: |
    API untuk katalog program, detail product, packages (landing), checkout, auth, student, instructor.
    Base URL = VITE_API_URL (contoh http://localhost:8080/api/v1).
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Development
paths:
  # --- Katalog ---
  /programs:
    get:
      summary: Katalog program (daftar dengan pagination & filter)
      operationId: getPrograms
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 12 }
        - name: category
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, total, page, totalPages]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProgramListItem' }
                  total: { type: integer }
                  page: { type: integer }
                  totalPages: { type: integer }

  /programs/{slug}:
    get:
      summary: Detail program by slug (detail product)
      operationId: getProgramBySlug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramDetail' }
        '404':
          description: Program tidak ditemukan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # --- Packages (Landing) ---
  /packages:
    get:
      summary: Daftar paket untuk section landing (Program yang Sedang Dibuka)
      operationId: getPackages
      responses:
        '200':
          description: OK — array snake_case
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PackageItem' }

  # --- Checkout ---
  /checkout/initiate:
    post:
      summary: Inisiasi checkout; jika ada order pending untuk user+program yang sama, kembalikan order itu (jangan buat baru)
      operationId: initiateCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                programSlug: { type: string }
                programId: { type: string, format: uuid }
                name: { type: string }
                email: { type: string, format: email }
                userId: { type: string, description: 'Id user yang login; cek order pending untuk user+program ini, jika ada kembalikan order tersebut' }
                expectedTotal: { type: number, description: 'Harga yang diharapkan (rupiah integer); WAJIB dipakai backend untuk set total/finalPrice/priceDisplay di response' }
                normalPrice: { type: number, description: 'Harga normal program (rupiah integer)' }
                expected_total: { type: number, description: 'Alias snake_case untuk expectedTotal' }
                normal_price: { type: number, description: 'Alias snake_case untuk normalPrice' }
                total: { type: number, description: 'Sama dengan expectedTotal; backend bisa pakai untuk set order.total' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutId: { type: string }
                  orderId: { type: string }
                  total: { type: number }
                  program:
                    type: object
                    properties:
                      title: { type: string }
                      priceDisplay: { type: string }
        '400':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /checkout/payment-session:
    post:
      summary: Buat sesi pembayaran; simpan amount & uniqueCode ke order/transaksi agar nominal tidak 0
      operationId: createPaymentSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [checkoutId, paymentMethod]
              properties:
                checkoutId: { type: string }
                paymentMethod:
                  type: string
                  enum: [bank_transfer, virtual_account, ewallet]
                promoCode: { type: string }
                uniqueCode: { type: integer, minimum: 100, maximum: 999, description: 'Kode unik 3 digit dari frontend untuk verifikasi transfer' }
                amount: { type: number, minimum: 0, description: 'Jumlah yang harus dibayar (termasuk kode unik). WAJIB disimpan ke order/transaksi agar riwayat transaksi menampilkan nominal benar.' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentUrl: { type: string, format: uri }
                  orderId: { type: string }
                  expiry: { type: string, format: date-time }
                  virtualAccountNumber: { type: string }
                  amount: { type: number }
        '400':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # --- Auth ---
  /auth/register:
    post:
      summary: Daftar akun (siswa/guru)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                role: { type: string, enum: [student, instructor] }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      summary: Login, dapat token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/me:
    get:
      summary: Data user saat ini (Bearer wajib)
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      summary: Logout
      operationId: logout
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK

  # --- Student ---
  /student/dashboard:
    get:
      summary: Ringkasan dashboard siswa (stats, recent)
      operationId: getStudentDashboard
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  coursesCount: { type: number }
                  recentCourses: { type: array, items: { $ref: '#/components/schemas/MyCourseItem' } }

  /student/courses:
    get:
      summary: Daftar kursus yang di-enroll + progress
      operationId: getStudentCourses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MyCourseItem' }

  /student/transactions:
    get:
      summary: Riwayat transaksi
      operationId: getStudentTransactions
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/TransactionItem' } }

  /student/profile:
    get:
      summary: Profil siswa
      operationId: getStudentProfile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  email: { type: string }
    put:
      summary: Update profil siswa
      operationId: updateStudentProfile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
      responses:
        '200':
          description: OK

  # --- Instructor ---
  /instructor/courses:
    get:
      summary: Daftar program yang diajar
      operationId: getInstructorCourses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/InstructorCourseItem' } }

  /instructor/students:
    get:
      summary: Daftar siswa (enrollment)
      operationId: getInstructorStudents
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/InstructorStudentItem' } }

  /instructor/earnings:
    get:
      summary: Ringkasan pendapatan
      operationId: getInstructorEarnings
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/InstructorEarningItem' } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
    ProgramListItem:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        shortDescription: { type: string }
        thumbnail: { type: string }
        price: { type: number }
        priceDisplay: { type: string }
        instructor:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            avatar: { type: string }
        category: { type: string }
        level: { type: string }
        duration: { type: string }
        rating: { type: number }
        reviewCount: { type: integer }
    ProgramDetail:
      allOf:
        - { $ref: '#/components/schemas/ProgramListItem' }
        - type: object
          properties:
            description: { type: string }
            modules:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  title: { type: string }
                  lessons:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        duration: { type: string }
            reviews:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  user: { type: string }
                  rating: { type: number }
                  comment: { type: string }
                  date: { type: string }
    PackageItem:
      type: object
      description: Response snake_case untuk landing packages
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        short_description: { type: string }
        price_display: { type: string }
        price_early_bird: { type: string }
        price_normal: { type: string }
        cta_label: { type: string }
        wa_message_template: { type: string }
        cta_url: { type: string }
        is_open: { type: boolean }
        is_bundle: { type: boolean }
        bundle_subtitle: { type: string }
        durasi: { type: string }
        materi: { type: array, items: { type: string } }
        fasilitas: { type: array, items: { type: string } }
        bonus: { type: array, items: { type: string } }
    AuthResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            email: { type: string }
            role: { type: string, enum: [student, instructor] }
        token: { type: string }
    MeResponse:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [student, instructor] }
    MyCourseItem:
      type: object
      properties:
        id: { type: string }
        program:
          type: object
          properties:
            id: { type: string }
            slug: { type: string }
            title: { type: string }
            thumbnail: { type: string }
        progressPercent: { type: number }
        enrolledAt: { type: string, format: date-time }
        lastAccessedAt: { type: string, format: date-time }
    TransactionItem:
      type: object
      properties:
        id: { type: string }
        orderId: { type: string }
        status: { type: string }
        total: { type: number }
        programs: { type: array, items: { type: object, properties: { title: { type: string } } } }
        paidAt: { type: string, format: date-time }
    InstructorCourseItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        slug: { type: string }
        category: { type: string }
        studentCount: { type: integer }
    InstructorStudentItem:
      type: object
      properties:
        userId: { type: string }
        name: { type: string }
        email: { type: string }
        programTitle: { type: string }
        progressPercent: { type: number }
    InstructorEarningItem:
      type: object
      properties:
        period: { type: string }
        revenue: { type: number }
        newStudents: { type: integer }
